services:
  gateway:
    build: ./gateway
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./workspace/Arduino:/workspace
      - ./workspace/.arduino15:/root/.arduino15
      - /dev:/dev

  clawdbot:
    build: ./clawdbot
    container_name: clawdbot
    restart: unless-stopped
    network_mode: host
    env_file: .env

  ei-mcp-bridge:
    build: ./ei-mcp-bridge
    container_name: ei-mcp-bridge
    restart: unless-stopped
    network_mode: host
    env_file: .env
    profiles: ["mcp"]

  ei-mcp-bridge-local:
    build: ./ei-mcp-bridge
    container_name: ei-mcp-bridge-local
    restart: unless-stopped
    network_mode: host
    env_file: .env
    profiles: ["mcp-local"]
    environment:
      EI_MCP_BIN: ${EI_MCP_BIN_LOCAL:-node}
      EI_MCP_ARGS: ${EI_MCP_ARGS_LOCAL:-/opt/ei-agentic-claude/dist/mcp-server.js}
    volumes:
      - ${EI_AGENTIC_CLAUDE_PATH:-/home/pi/ei-agentic-claude}:/opt/ei-agentic-claude:ro

  ei-mcp-bridge-image:
    build:
      context: ./ei-mcp-bridge
      dockerfile: Dockerfile.image
      args:
        EI_MCP_BASE_IMAGE: ${EI_MCP_BASE_IMAGE:-docker.io/eoinedge/ei-agentic-claude-mcp:test}
    container_name: ei-mcp-bridge-image
    restart: unless-stopped
    network_mode: host
    env_file: .env
    profiles: ["mcp-image"]
    entrypoint: ["node", "/app/server.cjs"]
    environment:
      EI_MCP_BIN: ${EI_MCP_BIN_IMAGE:-node}
      EI_MCP_ARGS: ${EI_MCP_ARGS_IMAGE:-/app/dist/mcp-server.js}

  arduino-mcp:
    image: ${ARDUINO_MCP_IMAGE:-docker.io/eoinedge/arduino-mcp:latest}
    container_name: arduino-mcp
    restart: unless-stopped
    network_mode: host
    profiles: ["mcp", "mcp-local", "mcp-image"]
    environment:
      PORT: 3080
      ARDUINO_FQBN: arduino:mbed_nano:nano33ble
      ARDUINO_AUTO_INSTALL_CORE: ${ARDUINO_AUTO_INSTALL_CORE:-1}
      ARDUINO_COMPILE_TIMEOUT_MS: ${ARDUINO_COMPILE_TIMEOUT_MS:-1200000}
    volumes:
      - ./workspace/Arduino:/workspace
      - ./workspace/.arduino15:/root/.arduino15
