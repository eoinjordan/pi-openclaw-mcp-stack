apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-mcp.fullname" . }}
  labels:
    {{- include "agentic-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentic-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/config.yaml") . | sha256sum }}
      labels:
        {{- include "agentic-mcp.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      serviceAccountName: {{ include "agentic-mcp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: mcp
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: stdio
          containerPort: 8081
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "agentic-mcp.fullname" . }}-config
        {{- if .Values.secretEnv }}
        - secretRef:
            name: {{ include "agentic-mcp.fullname" . }}-secret
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        {{- if .Values.persistence.enabled }}
        - name: models
          mountPath: /models
          readOnly: true
        - name: workspace
          mountPath: /workspace
        {{- end }}
        - name: device
          mountPath: /dev
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      {{- if .Values.persistence.enabled }}
      - name: models
        persistentVolumeClaim:
          claimName: {{ include "agentic-mcp.fullname" . }}-models
      - name: workspace
        persistentVolumeClaim:
          claimName: {{ include "agentic-mcp.fullname" . }}-workspace
      {{- end }}
      - name: device
        hostPath:
          path: /dev
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
